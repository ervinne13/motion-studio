<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Generate — Motion Studio</title>
  <link rel="stylesheet" href="/css/generate.css">
</head>
<body>

<div class="top-bar">
  <a href="/projects" class="top-bar-back">← Projects</a>
  <span class="top-bar-title">New Generation</span>
</div>

<div class="page">
  <span class="section-title">Source Video</span>
  <div class="upload-zone" id="zone-video">
    <input type="file" accept="video/*" id="input-video">
    <div class="upload-icon">🎬</div>
    <div class="upload-label">Upload video</div>
    <div class="upload-sub">Tap to choose a video file</div>
    <div class="upload-filename" id="video-name" hidden></div>
  </div>

  <span class="section-title">Reference Image</span>
  <div class="upload-zone" id="zone-image">
    <input type="file" accept="image/*" id="input-image">
    <div class="upload-icon">🖼</div>
    <div class="upload-label">Upload reference image</div>
    <div class="upload-sub">Tap to choose an image</div>
    <div class="upload-filename" id="image-name" hidden></div>
  </div>

  <span class="section-title">Generation Mode</span>
  <div class="settings-card">
    <div class="settings-row">
      <label class="settings-label" for="sel-mode">Mode</label>
      <select id="sel-mode">
        <option value="subject-replacement">Subject Replacement</option>
        <option value="motion-transfer">Motion Transfer</option>
      </select>
    </div>
  </div>

  <button class="advanced-toggle" id="btn-advanced" type="button">
    <span style="flex:1;text-align:left">Advanced Options</span>
    <span class="chevron">▼</span>
  </button>

  <div class="advanced-panel" id="advanced-panel">
    <div class="settings-card">
      <div class="settings-row">
        <label class="settings-label" for="adv-fps">Gen FPS</label>
        <input type="number" id="adv-fps" value="24" min="1" max="60">
      </div>
      <div class="settings-row">
        <label class="settings-label" for="adv-frames">Frames / Segment</label>
        <input type="number" id="adv-frames" value="81" min="5" max="257" step="4">
      </div>
      <div class="settings-row" style="flex-direction:column;align-items:stretch;gap:6px">
        <label class="settings-label" for="adv-prompt">Prompt</label>
        <input type="text" id="adv-prompt" placeholder="Optional prompt…">
      </div>
      <div class="settings-row">
        <label class="settings-label" for="adv-seed">Seed</label>
        <input type="number" id="adv-seed" value="-1" min="-1">
      </div>
    </div>
  </div>

  <div class="status-msg" id="status-msg"></div>
  <button class="btn-generate" id="btn-generate" disabled>Generate</button>
</div>

<script type="module" src="/js/generate.js"></script>
</body>
</html>
