<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Studio — Projects</title>
  <link rel="stylesheet" href="/shoelace/themes/light.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: var(--sl-font-sans);
      font-size: 13px;
      background: var(--sl-color-neutral-50);
      color: var(--sl-color-neutral-900);
    }

    /* ── Header ── */
    .pg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      background: #fff;
      border-bottom: 1px solid var(--sl-color-neutral-200);
      position: sticky; top: 0; z-index: 10;
    }
    .pg-brand {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700;
      color: var(--sl-color-neutral-900);
    }
    .pg-brand svg { width: 20px; height: 20px; color: var(--sl-color-primary-600); flex-shrink: 0; }
    .pg-title {
      font-size: 13px; font-weight: 600;
      color: var(--sl-color-neutral-500);
      letter-spacing: 0.02em;
    }
    .pg-brand-sep { color: var(--sl-color-neutral-300); font-weight: 400; }

    /* ── Main content ── */
    .pg-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .pg-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .pg-section-title {
      font-size: 18px; font-weight: 700;
      color: var(--sl-color-neutral-900);
    }

    /* ── Button ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 6px 14px;
      border: 1px solid var(--sl-color-neutral-300);
      background: #fff; border-radius: 6px;
      font-size: 13px; font-weight: 500; font-family: inherit;
      cursor: pointer; color: var(--sl-color-neutral-700);
      white-space: nowrap; line-height: 1.4; text-decoration: none;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn:hover { background: var(--sl-color-neutral-100); border-color: var(--sl-color-neutral-400); }
    .btn-primary {
      background: var(--sl-color-primary-600); border-color: var(--sl-color-primary-600); color: #fff;
    }
    .btn-primary:hover { background: var(--sl-color-primary-700); border-color: var(--sl-color-primary-700); }

    /* ── Project grid ── */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .proj-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--sl-color-neutral-400);
      padding: 60px 0;
      font-size: 14px;
    }

    .proj-loading {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--sl-color-neutral-400);
      padding: 60px 0;
      font-size: 14px;
    }

    .proj-card {
      background: #fff;
      border: 1px solid var(--sl-color-neutral-200);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.12s;
      display: flex;
      flex-direction: column;
    }
    .proj-card:hover {
      border-color: var(--sl-color-primary-300);
      box-shadow: 0 4px 16px rgba(99,102,241,0.12);
      transform: translateY(-2px);
    }

    .proj-thumb-wrap {
      aspect-ratio: 9/16;
      background: var(--sl-color-neutral-100);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .proj-thumb-wrap video,
    .proj-thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .proj-thumb-empty {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      color: var(--sl-color-neutral-300);
      font-size: 12px;
    }
    .proj-thumb-empty svg { width: 36px; height: 36px; }

    .proj-info {
      padding: 10px 12px 12px;
      flex: 1;
    }
    .proj-name {
      font-size: 13px; font-weight: 600;
      color: var(--sl-color-neutral-800);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .proj-meta {
      font-size: 11px;
      color: var(--sl-color-neutral-400);
    }
    .proj-progress {
      margin-top: 8px;
      height: 3px;
      background: var(--sl-color-neutral-100);
      border-radius: 2px;
      overflow: hidden;
    }
    .proj-progress-fill {
      height: 100%;
      background: var(--sl-color-success-500);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .proj-delete {
      position: absolute;
      top: 8px; right: 8px;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: rgba(0,0,0,0.35);
      border-radius: 50%; cursor: pointer;
      color: #fff; font-size: 12px; line-height: 1;
      opacity: 0;
      transition: opacity 0.1s, background 0.1s;
    }
    .proj-card:hover .proj-delete { opacity: 1; }
    .proj-delete:hover { background: rgba(239,68,68,0.9); }

    /* ── Sort + view controls ── */
    .pg-controls { display: flex; align-items: center; gap: 8px; }
    .pg-ctrl-group {
      display: flex;
      border: 1px solid var(--sl-color-neutral-200);
      border-radius: 6px;
      overflow: hidden;
    }
    .pg-ctrl-btn {
      padding: 5px 10px;
      background: #fff; border: none; border-right: 1px solid var(--sl-color-neutral-200);
      cursor: pointer; font-size: 11px; font-family: inherit;
      color: var(--sl-color-neutral-500);
      transition: background 0.1s, color 0.1s;
      white-space: nowrap; display: flex; align-items: center; justify-content: center;
    }
    .pg-ctrl-btn:last-child { border-right: none; }
    .pg-ctrl-btn:hover { background: var(--sl-color-neutral-50); color: var(--sl-color-neutral-700); }
    .pg-ctrl-btn.active {
      background: var(--sl-color-neutral-100);
      color: var(--sl-color-neutral-900);
      font-weight: 600;
    }
    .pg-ctrl-btn svg { width: 14px; height: 14px; }
    #btn-show-archived.active {
      background: var(--sl-color-neutral-100);
      color: var(--sl-color-neutral-900);
      font-weight: 600;
      border-color: var(--sl-color-neutral-300);
    }

    /* ── List view ── */
    .proj-grid.view-list { display: flex; flex-direction: column; gap: 4px; }
    .proj-row {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border: 1px solid var(--sl-color-neutral-200);
      border-radius: 8px; padding: 8px 12px;
      cursor: pointer; position: relative;
      transition: border-color 0.12s, background 0.12s;
    }
    .proj-row:hover { border-color: var(--sl-color-primary-300); background: var(--sl-color-primary-50); }
    .proj-row-thumb {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 5px; overflow: hidden;
      background: var(--sl-color-neutral-100);
    }
    .proj-row-thumb video, .proj-row-thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .proj-row-thumb-empty { width: 100%; height: 100%; }
    .proj-row-name {
      flex: 1; min-width: 0;
      font-size: 13px; font-weight: 600; color: var(--sl-color-neutral-800);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .proj-row-meta { font-size: 11px; color: var(--sl-color-neutral-400); white-space: nowrap; flex-shrink: 0; }
    .proj-row-modified {
      font-size: 11px; color: var(--sl-color-neutral-400);
      white-space: nowrap; flex-shrink: 0; min-width: 56px; text-align: right;
    }
    .proj-row-progress {
      width: 56px; flex-shrink: 0;
      height: 3px; background: var(--sl-color-neutral-100);
      border-radius: 2px; overflow: hidden;
    }
    .proj-row-progress-fill { height: 100%; background: var(--sl-color-success-500); border-radius: 2px; }
    .proj-row-delete {
      width: 24px; height: 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; border-radius: 4px;
      cursor: pointer; color: var(--sl-color-neutral-400); font-size: 12px;
      opacity: 0; transition: opacity 0.1s, background 0.1s, color 0.1s;
    }
    .proj-row:hover .proj-row-delete { opacity: 1; }
    .proj-row-delete:hover { background: var(--sl-color-danger-100); color: var(--sl-color-danger-600); }

    /* ── Archive button (card) ── */
    .proj-archive {
      position: absolute;
      top: 8px; right: 36px;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: rgba(0,0,0,0.35);
      border-radius: 50%; cursor: pointer; color: #fff;
      opacity: 0; transition: opacity 0.1s, background 0.1s;
    }
    .proj-archive svg { width: 13px; height: 13px; }
    .proj-card:hover .proj-archive { opacity: 1; }
    .proj-archive:hover { background: rgba(99,102,241,0.85); }

    /* ── Archive button (row) ── */
    .proj-row-archive {
      width: 24px; height: 24px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; border-radius: 4px;
      cursor: pointer; color: var(--sl-color-neutral-400);
      opacity: 0; transition: opacity 0.1s, background 0.1s, color 0.1s;
    }
    .proj-row-archive svg { width: 13px; height: 13px; }
    .proj-row:hover .proj-row-archive { opacity: 1; }
    .proj-row-archive:hover { background: var(--sl-color-primary-100); color: var(--sl-color-primary-600); }

    /* ── Archived badge on card ── */
    .proj-archived-badge {
      display: inline-block;
      font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px;
      background: var(--sl-color-neutral-100);
      color: var(--sl-color-neutral-500);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      .pg-main { padding: 16px 12px; }
      .pg-section-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .pg-controls { width: 100%; flex-wrap: wrap; gap: 6px; }
      .proj-grid:not(.view-list) {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <header class="pg-header">
    <div class="pg-brand">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path d="M2 6a2 2 0 012-2h12a2 2 0 012 2v1H2V6zm0 3h16v5a2 2 0 01-2 2H4a2 2 0 01-2-2V9zm4 2a1 1 0 000 2h8a1 1 0 000-2H6z"/>
      </svg>
      <span class="brand-name">Motion Studio</span>
      <span class="pg-brand-sep">·</span>
      <span class="pg-title">Projects</span>
    </div>
    <button class="btn btn-primary" id="btn-new-project">+ New Project</button>
  </header>

  <main class="pg-main">
    <div class="pg-section-header">
      <div class="pg-section-title">All Projects</div>
      <div class="pg-controls">
        <div class="pg-ctrl-group" id="sort-group">
          <button class="pg-ctrl-btn" data-sort="alpha-asc">A→Z</button>
          <button class="pg-ctrl-btn" data-sort="alpha-desc">Z→A</button>
          <button class="pg-ctrl-btn" data-sort="modified-desc">Newest</button>
          <button class="pg-ctrl-btn" data-sort="modified-asc">Oldest</button>
        </div>
        <div class="pg-ctrl-group" id="view-group">
          <button class="pg-ctrl-btn" data-view="grid" title="Grid view">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zm0 8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zm6-6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zm0 8a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          </button>
          <button class="pg-ctrl-btn" data-view="list" title="List view">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
          </button>
        </div>
        <div class="pg-ctrl-group" id="preview-group">
          <button class="pg-ctrl-btn" data-preview="video" title="Video preview">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zm12.553 1.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"/></svg>
          </button>
          <button class="pg-ctrl-btn" data-preview="image" title="Image preview">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/></svg>
          </button>
        </div>
        <button class="pg-ctrl-btn" id="btn-show-archived" title="Show archived projects" style="border:1px solid var(--sl-color-neutral-200);border-radius:6px;gap:5px">
          <svg viewBox="0 0 20 20" fill="currentColor" style="width:13px;height:13px"><path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4zM3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/></svg>
          Archived <span id="archived-count" hidden></span>
        </button>
      </div>
    </div>
    <div class="proj-grid" id="proj-grid">
      <div class="proj-loading">Loading…</div>
    </div>
  </main>

  <script type="module" src="/js/projects.js"></script>
</body>
</html>
